<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Diet Advisor</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>🥗 AI Diet Advisor</h1>
<p class="subtitle">Smart calorie analysis using AI</p>

<div class="card">

<input id="age" type="number" placeholder="Age">

<input id="weight" type="number" placeholder="Weight (kg)">

<select id="goal">
<option value="lose weight">Lose Weight</option>
<option value="maintain weight">Maintain Weight</option>
<option value="gain muscle">Gain Muscle</option>
</select>

<textarea id="food" placeholder="Example: 2 eggs, rice, dal, chicken curry"></textarea>

<button onclick="analyze()">Analyze Diet</button>

</div>

<div id="result"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
