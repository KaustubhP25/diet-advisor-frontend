<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Diet Advisor</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Small style addition for the login button */
        .login-button {
            background-color: #4a90e2;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .login-button:hover { background-color: #357abd; }
        #auth-status { margin-bottom: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥗 AI Diet Advisor</h1>
        <p class="subtitle">Smart calorie analysis using AI</p>
        
        <div class="card">
            <div id="auth-status"></div>
            <button type="button" id="login-btn" class="login-button">Login to Start</button>

            <input id="age" type="number" placeholder="Age">
            <input id="weight" type="number" placeholder="Weight (kg)">
            <select id="goal">
                <option value="lose weight">Lose Weight</option>
                <option value="maintain weight">Maintain Weight</option>
                <option value="gain muscle">Gain Muscle</option>
            </select>
            <textarea id="food" placeholder="Example: 2 eggs, rice, dal, chicken curry"></textarea>
            <button id="analyze-btn" onclick="analyze()">Analyze Diet</button>
        </div>
        <div id="result"></div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
